name: CI

  on:
    push:
      branches: [develop, main]
    pull_request:
      branches: [develop, main]

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: maven

        - name: Build with Maven (skip tests)
          run: ./mvnw clean package -DskipTests

        - name: Run tests
          env:
            SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            SPRING_JWT_SECRET: ${{ secrets.SPRING_JWT_SECRET }}
            SPRING_ACCESS_TOKEN_EXPIRE: ${{ secrets.SPRING_ACCESS_TOKEN_EXPIRE }}
            SPRING_REFRESH_TOKEN_EXPIRE: ${{ secrets.SPRING_REFRESH_TOKEN_EXPIRE }}
            CLOUD_NAME: ${{ secrets.CLOUD_NAME }}
            API_KEY: ${{ secrets.API_KEY }}
            API_SECRET: ${{ secrets.API_SECRET }}
            SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
            SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
            SPRING_ADMIN_USERNAME: ${{ secrets.SPRING_ADMIN_USERNAME }}
            SPRING_ADMIN_EMAIL: ${{ secrets.SPRING_ADMIN_EMAIL }}
            SPRING_ADMIN_PASSWORD: ${{ secrets.SPRING_ADMIN_PASSWORD }}
            SPRING_GROQ_API_KEY: ${{ secrets.SPRING_GROQ_API_KEY }}
            ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
            ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          run: ./mvnw test